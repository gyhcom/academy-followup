spring:
  application:
    name: academy-followup-api

debug: false

logging:
  level:
    root: INFO

server:
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

academy-followup:
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  solapi:
    api-key: ${SOLAPI_API_KEY:}
    api-secret: ${SOLAPI_API_SECRET:}
    sender-phone: ${SOLAPI_SENDER_PHONE:}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3010,http://localhost:3011}
